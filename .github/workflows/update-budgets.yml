name: 예산액 자동 갱신
on:
  workflow_dispatch:        # 수동 실행 버튼
  schedule:
    - cron: "0 3 1 * *"     # 매월 1일 (API 키 등록 시 의미 있음)
  push:
    paths: ["data/raw/**"]  # 새 열린재정 엑셀을 올리면 즉시 실행
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: 접속 진단
        run: |
          echo "── IPv4 테스트 ──"
          curl -4 -m 20 -sv -o /dev/null "https://openapi.openfiscaldata.go.kr" 2>&1 | tail -5 || true
          echo "── 기본(IPv6 포함) 테스트 ──"
          curl -m 20 -sv -o /dev/null "https://openapi.openfiscaldata.go.kr" 2>&1 | tail -5 || true
      - run: npm install xlsx --no-save
      - run: node scripts/update-budgets.mjs
        env:
          OPENFISCAL_KEY: ${{ secrets.OPENFISCAL_KEY }}
      - name: 변경 시 커밋
        run: |
          git config user.name "budget-bot"
          git config user.email "bot@users.noreply.github.com"
          git add src/live-budgets.json
          git diff --cached --quiet || git commit -m "예산액 자동 갱신 $(date +%F)"
          git push
