name: 예산액 자동 갱신
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 1 * *"
  push:
    paths: ["data/raw/**"]
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install xlsx --no-save
      - run: node scripts/update-budgets.mjs
        env:
          OPENFISCAL_KEY: ${{ secrets.OPENFISCAL_KEY }}
      - name: 변경 시 커밋
        run: |
          git config user.name "budget-bot"
          git config user.email "bot@users.noreply.github.com"
          git add src/live-budgets.json
          git diff --cached --quiet || git commit -m "예산액 자동 갱신 $(date +%F)"
          git push
